site_name: spherex-cutoutdb
site_description: SPHEREx cutout database and download workflow for reproducible scientific analysis.
site_url: https://spherex-cutoutdb.readthedocs.io/

repo_url: https://github.com/yayasaikou1/spherex-cutoutdb
repo_name: yayasaikou1/spherex-cutoutdb

theme:
  name: readthedocs
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: INSTALL_HELP.md
  - Quickstart: quickstart.md
  - INTEGRATED_WORKFLOW_TUTORIAL: INTEGRATED_WORKFLOW_TUTORIAL.md
  - Troubleshooting: troubleshooting.md
  - Chinese Tutorial: tutorials_SC.md

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
